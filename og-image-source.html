<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#080808;display:flex;align-items:center;justify-content:space-between;padding:80px 100px;overflow:hidden;position:relative;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(200,245,66,0.07),transparent 60%);}
.left{position:relative;z-index:1;}
.tag{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,245,66,0.7);border:1px solid rgba(200,245,66,0.3);padding:6px 16px;border-radius:50px;display:inline-block;margin-bottom:32px;}
.title{font-family:'Bebas Neue',Impact,sans-serif;font-size:120px;line-height:.85;letter-spacing:-.02em;color:#e8e4db;}
.title span{color:#c8f542;}
.sub{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:300;color:rgba(232,228,219,0.5);margin-top:32px;line-height:1.5;}
.right{position:relative;z-index:1;text-align:right;}
.price{font-family:'Bebas Neue',Impact,sans-serif;font-size:96px;color:#c8f542;line-height:.85;letter-spacing:-.02em;}
.price-label{font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,228,219,0.35);margin-top:12px;}
.bg-text{position:absolute;bottom:-40px;right:-20px;font-family:'Bebas Neue',Impact,sans-serif;font-size:360px;color:rgba(232,228,219,0.03);line-height:1;pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div class="left">
  <div class="tag">studio72h.com</div>
  <div class="title">Tu negocio<br><span>en internet.</span></div>
  <div class="sub">Diseño · Dominio · Hosting · WhatsApp<br>Todo incluido. Entrega en 72 horas.</div>
</div>
<div class="right">
  <div class="price">$500K</div>
  <div class="price-label">COP · Precio único</div>
</div>
<div class="bg-text">72H</div>
</body>
</html>
