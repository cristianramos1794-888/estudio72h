<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Página no encontrada · Studio72H</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Bebas+Neue&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--cream:#e8e4db;--cream3:rgba(232,228,219,0.3);--lime:#c8f542;--bebas:'Bebas Neue',Impact,sans-serif;--sans:'Space Grotesk',system-ui,sans-serif;--serif:'Instrument Serif',Georgia,serif;}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--cream);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased;}
.wrap{max-width:600px;}
.num{font-family:var(--bebas);font-size:clamp(8rem,25vw,18rem);line-height:.8;color:var(--lime);letter-spacing:-.04em;}
h1{font-family:var(--bebas);font-size:clamp(2rem,6vw,4rem);line-height:.9;letter-spacing:-.02em;margin:.5rem 0 1rem;}
h1 em{font-family:var(--serif);font-style:italic;color:var(--cream3);}
p{font-size:.9rem;color:var(--cream3);line-height:1.8;margin-bottom:2.5rem;}
a.btn{display:inline-flex;align-items:center;gap:.6rem;background:var(--lime);color:var(--bg);font-weight:600;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;padding:1rem 2.2rem;text-decoration:none;border-radius:4px;transition:transform .3s,box-shadow .3s;}
a.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(200,245,66,.25);}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>Página no <em>encontrada.</em></h1>
  <p>Esta URL no existe, pero tu página web sí puede existir — en 72 horas.</p>
  <a href="/" class="btn">Volver al inicio →</a>
</div>
</body>
</html>
